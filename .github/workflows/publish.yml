name: Publish npm package

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm test
      - run: npm run build --workspace=asdf-fox
      - run: npm publish --workspace=asdf-fox --access public --provenance
